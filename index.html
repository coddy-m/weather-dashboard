<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body.weather-app {
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.8s ease;
}

/* Default */
.weather-app { background: linear-gradient(135deg, #667eea, #764ba2); }

/* Weather backgrounds */
.clear { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
.sunny { background: linear-gradient(135deg, #f1d325, #f1d325); }
.cloudy { background: linear-gradient(135deg, #94a3b8, #64748b); }
.rainy { background: linear-gradient(135deg, #64748b, #334155); }
.thunderstorm { background: linear-gradient(135deg, #1e293b, #0f172a); }
.snowy { background: linear-gradient(135deg, #e0f2fe, #bae6fd); }
.misty { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }

.container {
    background: white;
    border-radius: 16px;
    padding: 30px;
    max-width: 620px;
    width: 100%;
    box-shadow: 0 15px 50px rgba(0,0,0,0.25);
}

h1 { text-align: center; margin-bottom: 25px; }

form { display: flex; gap: 10px; margin-bottom: 20px; }

input {
    flex: 1;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
}

button {
    padding: 12px 20px;
    background: #757c9c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.hidden { display: none; }

#error {
    background: #fee;
    color: #d32f2f;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
}

#weather {
    background: #82b4bd;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

#temp { font-size: 40px; font-weight: bold; }

.forecast-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
}

.forecast-card {
    background: #cbe4f7;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

/* Recent searches */
#recentList {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.recent-btn {
    padding: 6px 12px;
    border-radius: 20px;
    border: none;
    background: #9fc75a;
    cursor: pointer;
}

.recent-btn:hover {
    background: #e2e4ee;
    color: rgb(48, 162, 170);
}
</style>
</head>

<body class="weather-app">

<div class="container">
<h1>Weather App</h1>

<form id="searchForm">
    <input type="text" id="cityInput" placeholder="Enter city..." required>
    <button>Search</button>
</form>

<div id="loading" class="hidden">Loading...</div>
<div id="error" class="hidden"></div>

<div id="weather" class="hidden">
    <h2 id="cityName"></h2>
    <p id="temp"></p>
    <p id="description"></p>
    <p id="details"></p>
</div>

<div id="forecast" class="hidden">
    <h3>5-Day Forecast</h3>
    <div id="forecastContainer" class="forecast-grid"></div>
</div>

<h3>Recent Searches</h3>
<div id="recentList"></div>

</div>

<script>
const API_KEY = "6e3d6a1edfe2a626a7216cbf3d7d9442";

const form = document.getElementById("searchForm");
const input = document.getElementById("cityInput");
const loading = document.getElementById("loading");
const errorDiv = document.getElementById("error");

form.addEventListener("submit", e => {
    e.preventDefault();
    const city = input.value.trim();
    if (!city) return;
    fetchWeather(city);
    input.value = "";
});

async function fetchWeather(city) {
    loading.classList.remove("hidden");
    loading.textContent = "Fetching weather for " + city + "...";

    errorDiv.classList.add("hidden");
    document.getElementById("weather").classList.add("hidden");
    document.getElementById("forecast").classList.add("hidden");

    try {
        const currentURL = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`;
        const forecastURL = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`;

        const res1 = await fetch(currentURL);
        if (!res1.ok) throw new Error("City not found");

        const current = await res1.json();

        const res2 = await fetch(forecastURL);
        if (!res2.ok) throw new Error("Forecast error");

        const forecast = await res2.json();

        displayCurrent(current);
        displayForecast(forecast);
        saveRecent(city);

    } catch (err) {
        if (err.message.includes("Failed to fetch")) {
            errorDiv.textContent = "Network error. Check your internet.";
        } else {
            errorDiv.textContent = err.message;
        }
        errorDiv.classList.remove("hidden");
    } finally {
        loading.classList.add("hidden");
    }
}

function displayCurrent(data) {
    document.getElementById("cityName").textContent = data.name;
    document.getElementById("temp").textContent = Math.round(data.main.temp) + "°C";
    document.getElementById("description").textContent = data.weather[0].description;
    document.getElementById("details").textContent =
        "Humidity: " + data.main.humidity + "%";

    setBackground(
        data.weather[0].main,
        data.weather[0].description

    );

    document.getElementById("weather").classList.remove("hidden");
}

function displayForecast(data) {
    const container = document.getElementById("forecastContainer");
    container.innerHTML = "";

    const days = {};

    data.list.forEach(item => {
        const date = new Date(item.dt * 1000).toDateString();
        if (!days[date]) days[date] = item;
    });

    Object.values(days).slice(0,5).forEach(day => {
        const card = document.createElement("div");
        card.className = "forecast-card";
        card.innerHTML = `
            <p>${new Date(day.dt * 1000).toLocaleDateString()}</p>
            <p>${Math.round(day.main.temp)}°C</p>
        `;
        container.appendChild(card);
    });

    document.getElementById("forecast").classList.remove("hidden");
}
function setBackground(weatherMain, weatherDesc) {
    const body = document.body;
    body.className = "weather-app"; // reset

    const main = weatherMain.toLowerCase();
    const desc = weatherDesc.toLowerCase();

    if (main.includes("clear")) {
        body.classList.add("sunny");
    } 
    else if (main.includes("cloud")) {
        body.classList.add("cloudy");
    } 
    else if (main.includes("rain") || desc.includes("drizzle")) {
        body.classList.add("rainy");
    } 
    else if (main.includes("thunder")) {
        body.classList.add("thunderstorm");
    } 
    else if (main.includes("snow")) {
        body.classList.add("snowy");
    } 
    else if (main.includes("mist") || main.includes("fog") || main.includes("haze")) {
        body.classList.add("misty");
    } 
    else {
        body.classList.add("clear"); // fallback
    }
}



/* Recent Searches */
function saveRecent(city) {
    let list = JSON.parse(localStorage.getItem("cities")) || [];

    list = list.filter(c => c.toLowerCase() !== city.toLowerCase());
    list.unshift(city);

    if (list.length > 5) list.pop();

    localStorage.setItem("cities", JSON.stringify(list));
    renderRecent();
}

function renderRecent() {
    const container = document.getElementById("recentList");
    container.innerHTML = "";

    const list = JSON.parse(localStorage.getItem("cities")) || [];

    list.forEach(city => {
        const btn = document.createElement("button");
        btn.className = "recent-btn";
        btn.textContent = city;
        btn.onclick = () => fetchWeather(city);
        container.appendChild(btn);
    });
}

renderRecent();
</script>

</body>
</html>
